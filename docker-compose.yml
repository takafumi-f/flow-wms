services:
  postgres:
    image: postgres:16-alpine
    container_name: flow-wms-postgres
    environment:
      POSTGRES_USER: flowwms
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: flowwms
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed/01_master.sql:/docker-entrypoint-initdb.d/02_master.sql
      - ./db/seed/02_demo.sql:/docker-entrypoint-initdb.d/03_demo.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flowwms -d flowwms']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flow-wms-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    container_name: flow-wms-pgbouncer
    environment:
      DATABASE_URL: postgres://flowwms:secret@postgres:5432/flowwms
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    ports:
      - '6432:5432'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
